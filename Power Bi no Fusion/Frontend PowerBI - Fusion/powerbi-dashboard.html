
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Power Bi</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #pbi { height: 100vh; width: 100%; position: relative; overflow: hidden; }

    /* Loader overlay */
    .loader { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .sr-only { position: absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap; }

    /* From Uiverse.io by Pradeepsaranbishnoi (hand tap) */
    .🤚 { --skin-color: #E4C560; --tap-speed: 0.6s; --tap-stagger: 0.1s; position: relative; width: 80px; height: 60px; margin-left: 0; }
    .🤚:before { content: ''; display: block; width: 180%; height: 75%; position: absolute; top: 70%; right: 20%; background-color: black; border-radius: 40px 10px; filter: blur(10px); opacity: 0.15; }
    .🌴 { display:block; width:100%; height:100%; position:absolute; top:0; left:0; background-color:var(--skin-color); border-radius:10px 40px; }
    .👍 { position:absolute; width:120%; height:38px; background-color:var(--skin-color); bottom:-18%; right:1%; transform-origin: calc(100% - 20px) 20px; transform: rotate(-20deg); border-radius:30px 20px 20px 10px; border-bottom:2px solid rgba(0,0,0,0.1); border-left:2px solid rgba(0,0,0,0.1); }
    .👍:after { width:20%; height:60%; content:''; background-color: rgba(255,255,255,0.3); position:absolute; bottom:-8%; left:5px; border-radius:60% 10% 10% 30%; border-right:2px solid rgba(0,0,0,0.05); }
    .👉 { position:absolute; width:80%; height:35px; background-color:var(--skin-color); bottom:32%; right:64%; transform-origin:100% 20px; animation-duration:calc(var(--tap-speed)*2); animation-timing-function:ease-in-out; animation-iteration-count:infinite; transform: rotate(10deg); }
    .👉:before { content:''; position:absolute; width:140%; height:30px; background-color:var(--skin-color); bottom:8%; right:65%; transform-origin: calc(100% - 20px) 20px; transform: rotate(-60deg); border-radius:20px; }
    .👉:nth-child(1) { animation-delay:0; filter:brightness(70%); animation-name:tap-upper-1; }
    .👉:nth-child(2) { animation-delay:var(--tap-stagger); filter:brightness(80%); animation-name:tap-upper-2; }
    .👉:nth-child(3) { animation-delay:calc(var(--tap-stagger)*2); filter:brightness(90%); animation-name:tap-upper-3; }
    .👉:nth-child(4) { animation-delay:calc(var(--tap-stagger)*3); filter:brightness(100%); animation-name:tap-upper-4; }
    @keyframes tap-upper-1 { 0%,50%,100% { transform: rotate(10deg) scale(0.4); } 40% { transform: rotate(50deg) scale(0.4); } }
    @keyframes tap-upper-2 { 0%,50%,100% { transform: rotate(10deg) scale(0.6); } 40% { transform: rotate(50deg) scale(0.6); } }
    @keyframes tap-upper-3 { 0%,50%,100% { transform: rotate(10deg) scale(0.8); } 40% { transform: rotate(50deg) scale(0.8); } }
    @keyframes tap-upper-4 { 0%,50%,100% { transform: rotate(10deg) scale(1); } 40% { transform: rotate(50deg) scale(1); } }
    /* From Uiverse.io by Praashoo7 (NOT FOUND tv) */
    /* Page-level error layout (applied when body gets .error-page) */
    body.error-page { background: #c7b29e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    /* make positioning predictable for absolute children */
    .main_wrapper{display:flex;align-items:center;justify-content:center;width:24rem;height:16rem;position:relative}
    .main{display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:0;position:relative}
    /* ensure tv pseudo-elements position relative to tv element */
    .tv{position:relative}
    .antenna{width:5em;height:5em;border-radius:50%;border:2px solid black;background-color:#f27405;margin-bottom:-6em;margin-left:0em;z-index:-1}
    .antenna_shadow{position:absolute;background-color:transparent;width:50px;height:56px;margin-left:1.68em;border-radius:45%;transform:rotate(140deg);border:4px solid transparent;box-shadow:inset 0px 16px #a85103,inset 0px 16px 1px 1px #a85103}
    .antenna::after{content:"";position:absolute;margin-top:-9.4em;margin-left:0.4em;transform:rotate(-25deg);width:1em;height:0.5em;border-radius:50%;background-color:#f69e50}
    .antenna::before{content:"";position:absolute;margin-top:0.2em;margin-left:1.25em;transform:rotate(-20deg);width:1.5em;height:0.8em;border-radius:50%;background-color:#f69e50}
    .a1{position:relative;top:-102%;left:-130%;width:12em;height:5.5em;border-radius:50px;background-image:linear-gradient(#171717,#171717,#353535,#353535,#171717);transform:rotate(-29deg);clip-path:polygon(50% 0%, 49% 100%, 52% 100%)}
    .a1d{position:relative;top:-211%;left:-35%;transform:rotate(45deg);width:0.5em;height:0.5em;border-radius:50%;border:2px solid black;background-color:#979797;z-index:99}
    .a2{position:relative;top:-210%;left:-10%;width:12em;height:4em;border-radius:50px;background-color:#171717;background-image:linear-gradient(#171717,#171717,#353535,#353535,#171717);margin-right:5em;clip-path:polygon(47% 0,47% 0,34% 34%,54% 25%,32% 100%,29% 96%,49% 32%,30% 38%);transform:rotate(-8deg)}
    .a2d{position:relative;top:-294%;left:94%;width:0.5em;height:0.5em;border-radius:50%;border:2px solid black;background-color:#979797;z-index:99}
    .notfound_text{background-color:black;padding-left:0.3em;padding-right:0.3em;font-size:0.75em;color:white;letter-spacing:0;border-radius:5px;z-index:10}
    .tv{width:17em;height:9em;margin-top:3em;border-radius:15px;background-color:#d36604;display:flex;justify-content:center;border:2px solid #1d0e01;box-shadow:inset 0.2em 0.2em #e69635}
    .tv::after{content:"";position:absolute;width:17em;height:9em;border-radius:15px;background:repeating-radial-gradient(#d36604 0 0.0001%, #00000070 0 0.0002%) 50% 0/2500px 2500px,repeating-conic-gradient(#d36604 0 0.0001%, #00000070 0 0.0002%) 60% 60%/2500px 2500px;background-blend-mode:difference;opacity:0.09}
    .curve_svg{position:absolute;margin-top:0.25em;margin-left:-0.25em;height:12px;width:12px}
    .display_div{display:flex;align-items:center;align-self:center;justify-content:center;border-radius:15px;box-shadow:3.5px 3.5px 0px #e69635}
    .screen_out{width:auto;height:auto;border-radius:10px}
    .screen_out1{width:11em;height:7.75em;display:flex;align-items:center;justify-content:center;border-radius:10px}
    .screen{width:13em;height:7.85em;font-family:Montserrat;border:2px solid #1d0e01;background:repeating-radial-gradient(#000 0 0.0001%, #ffffff 0 0.0002%) 50% 0/2500px 2500px,repeating-conic-gradient(#000 0 0.0001%, #ffffff 0 0.0002%) 60% 60%/2500px 2500px;background-blend-mode:difference;animation:b 0.2s infinite alternate;border-radius:10px;z-index:99;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#252525;letter-spacing:0.15em;text-align:center}
    .screenM{width:13em;height:7.85em;position:relative;font-family:Montserrat;background:linear-gradient(to right,#002fc6 0%,#002bb2 14.2857142857%,#3a3a3a 14.2857142857%,#303030 28.5714285714%,#ff0afe 28.5714285714%,#f500f4 42.8571428571%,#6c6c6c 42.8571428571%,#626262 57.1428571429%,#0affd9 57.1428571429%,#00f5ce 71.4285714286%,#3a3a3a 71.4285714286%,#303030 85.7142857143%,white 85.7142857143%,#fafafa 100%);border-radius:10px;border:2px solid black;z-index:99;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#252525;letter-spacing:0.15em;text-align:center;overflow:hidden}
    .screenM:before,.screenM:after{content:"";position:absolute;left:0;z-index:1;width:100%}
    .screenM:before{top:0;height:68.4782608696%;background:linear-gradient(to right,white 0%,#fafafa 14.2857142857%,#ffe60a 14.2857142857%,#f5dc00 28.5714285714%,#0affd9 28.5714285714%,#00f5ce 42.8571428571%,#10ea00 42.8571428571%,#0ed600 57.1428571429%,#ff0afe 57.1428571429%,#f500f4 71.4285714286%,#ed0014 71.4285714286%,#d90012 85.7142857143%,#002fc6 85.7142857143%,#002bb2 100%)}
    .screenM:after{bottom:0;height:21.7391304348%;background:linear-gradient(to right,#006c6b 0%,#005857 16.6666666667%,white 16.6666666667%,#fafafa 33.3333333333%,#001b75 33.3333333%,#001761 50%,#6c6c6c 50%,#626262 66.6666666667%,#929292 66.6666666667%,#888888 83.3333333333%,#3a3a3a 83.3333333333%,#303030 100%)}
    @keyframes b{100%{background-position:50% 0,60% 50%}}
    /* Error-page: show single screen only */
    body.error-page .screenM { display: none !important; }
    /* reduced size to match reference */
    body.error-page .screen { display: flex !important; width: 15rem !important; height: 9rem !important; }
    body.error-page .screen_out1 { width: 15.5rem !important; height: 9.5rem !important; }
  </style>
</head>
<body>
  <div id="pbi">
    <div class="loader" aria-hidden="true">
      <!-- From Uiverse.io by Pradeepsaranbishnoi -->
      <div class="🤚">
        <div class="👉"></div>
        <div class="👉"></div>
        <div class="👉"></div>
        <div class="👉"></div>
        <div class="🌴"></div>
        <div class="👍"></div>
      </div>
      <div class="sr-only">Carregando Dashboard...</div>
    </div>
    <!-- Static fallback TV markup (hidden) -->
    <div id="tv-fallback" style="display:none;">
      <div class="main_wrapper">
        <div class="main">
          <div class="antenna">
            <div class="antenna_shadow"></div>
            <div class="a1"></div>
            <div class="a1d"></div>
            <div class="a2"></div>
            <div class="a2d"></div>
            <div class="a_base"></div>
          </div>
          <div class="tv">
            <div class="curve">
              <svg class="curve_svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 189.929 189.929">
                <path d="M70.343,70.343c-30.554,30.553-44.806,72.7-39.102,115.635l-29.738,3.951C-5.442,137.659,11.917,86.34,49.129,49.13 C86.34,11.918,137.664-5.445,189.928,1.502l-3.95,29.738C143.041,25.54,100.895,39.789,70.343,70.343z"></path>
              </svg>
            </div>
            <div class="display_div">
              <div class="screen_out">
                <div class="screen_out1">
                  <div class="screen"><span class="notfound_text"> NOT FOUND</span></div>
                </div>
              </div>
            </div>
            <div class="lines"><div class="line1"></div><div class="line2"></div><div class="line3"></div></div>
            <div class="buttons_div">
              <div class="b1"><div></div></div>
              <div class="b2"></div>
              <div class="speakers"><div class="g1"><div class="g11"></div><div class="g12"></div><div class="g13"></div></div><div class="g"></div><div class="g"></div></div>
            </div>
          </div>
          <div class="bottom"><div class="base1"></div><div class="base2"></div><div class="base3"></div></div>
        </div>
        <div class="text_404"><div class="text_4041">4</div><div class="text_4042">0</div><div class="text_4043">4</div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/powerbi-client/dist/powerbi.min.js"></script>

  <script>
  (async function() {
    const SPRING_BASE_URL = "http://localhost:8080";

    const res = await fetch(SPRING_BASE_URL + "/api/powerbi/embed-config", {
      method: "GET",
      headers: { "Accept": "application/json" }
    });

    if (!res.ok) throw new Error("Falha ao obter embed-config (HTTP " + res.status + ")");
    const cfg = await res.json();

    const models = window['powerbi-client'].models;
    const container = document.getElementById("pbi");

    const embedConfig = {
      type: "report",
      id: cfg.reportId,
      embedUrl: cfg.embedUrl,
      accessToken: cfg.embedToken,
      tokenType: models.TokenType.Embed
    };

    window.powerbi.reset(container);
    const report = window.powerbi.embed(container, embedConfig);

    // Remove loader when the report is fully loaded
    try {
      if (report && report.on) {
        report.on('loaded', () => {
          const loader = container.querySelector('.loader');
          if (loader) loader.remove();
        });
      } else {
        setTimeout(() => {
          const loader = container.querySelector('.loader');
          if (loader) loader.remove();
        }, 1500);
      }
    } catch (e) {
      const loader = container.querySelector('.loader');
      if (loader) loader.remove();
    }
  })().catch(err => {
    console.error(err);
    const container = document.getElementById('pbi');
    const loader = container && container.querySelector ? container.querySelector('.loader') : null;
    if (loader) loader.remove();

    // Mark body so CSS centers the fallback content
    document.body.classList.add('error-page');

    // If a static fallback element exists in the DOM, show it; otherwise keep simple message.
    const fallbackEl = document.getElementById('tv-fallback');
    if (fallbackEl && container) {
      container.innerHTML = '';
      // show and move the fallback into the container so styles apply
      fallbackEl.style.display = 'block';
      container.appendChild(fallbackEl);
      container.style.display = 'flex';
      container.style.alignItems = 'center';
      container.style.justifyContent = 'center';
      container.style.minHeight = '100vh';
      const msg = document.createElement('div');
      msg.style.textAlign = 'center';
      msg.style.marginTop = '1rem';
      msg.style.color = '#333';
      msg.textContent = `Erro: ${err.message}`;
      container.appendChild(msg);
    } else if (container) {
      container.innerHTML = `<div style="padding:1rem;text-align:center;color:#333;">Erro: ${err.message}</div>`;
    }
  });
</script>

</body>
</html>
